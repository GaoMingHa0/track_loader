# ===============================================================================
# WUTA-FSD 仿真器 — Straight Acceleration 直线加速赛道
#
# 坐标系：+X由起点指向终点，+Y为车辆左侧，+Z向上。
# 净赛道宽3.0 m按锥桶底座内边缘计算；0.20 m底座中心位于y=±1.60 m。
# 起跑位置线x=-0.30 m，计时起点线x=0 m，终点线x=75 m，停止区终点x=175 m。
# ===============================================================================
track:
  type: acceleration
  start_pose:
    x: -0.300
    y: 0.000
    yaw: 0.0000000000000000

  geometry:
    frame_id: map
    units: m
    coordinate_convention:
      x_positive: start_to_finish
      y_positive: vehicle_left
      z_positive: up
      yaw_zero: positive_x
      yaw_positive: counterclockwise
    lane_width_inner_edges: 3.000
    cone_base_width: 0.200
    cone_center_offset_y: 1.600
    marker_spacing: 5.000
    acceleration_distance: 75.000
    stopping_distance: 100.000
    start_position_line_x: -0.300
    timing_start_line_x: 0.000
    finish_line_x: 75.000
    stop_end_line_x: 175.000
    map_bounds:
      min_x: -5.000
      max_x: 180.000
      min_y: -3.000
      max_y: 3.000

  cone_models:
    route_cone:
      base_length: 0.200
      base_width: 0.200
      height: 0.300
      reflective_bands: 1
      reflective_color: white
    yellow_low_cone:
      base_length: 0.200
      base_width: 0.200
      height: 0.300
      reflective_bands: 1
      reflective_color: white

  blue_cones:
