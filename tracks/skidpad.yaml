# ==============================================================================
# WUTA-FSD 仿真器 — Figure-8 / Skidpad 八字绕环赛道（X/Y轴转换版）
#
# 坐标转换：
#   x_new =  y_old
#   y_new = -x_old
#   yaw_new = yaw_old - pi/2
#
# 新坐标系：
#   +X：入口指向出口
#   +Y：车辆朝出口方向时的左侧
#   +Z：向上
#
# 四类锥桶：
#   blue_cones        蓝色行径锥桶，0.20 x 0.20 x 0.30 m
#   red_cones         红色行径锥桶，0.20 x 0.20 x 0.30 m
#   yellow_low_cones  低黄色减速锥桶，0.20 x 0.20 x 0.30 m
#   yellow_high_cones 高黄色换向锥桶，0.35 x 0.35 x 0.70 m
#
# 圆心距 18.25 m；内/外圈直径 15.25/21.25 m；赛道宽 3.0 m。
# 车辆由计时线前 15 m 的入口 x=-15 m 沿 +X 驶入，先顺时针下方圆两圈，再逆时针
# 上方圆两圈，最后沿 +X 从出口离开。
# ==============================================================================
track:
  type: figure8
  start_pose:
    x: -15.0
    y: 0.0
    yaw: 0.0

  # 蓝色行径锥桶：下方圆内圈16个 + 上方圆外圈13个。
  blue_cones:
    # 原右圆内圈转换后：圆心 (0.0, -9.125)，半径 7.625 m。
    - [0.000, -1.500, 0.0]
    - [2.918, -2.080, 0.0]
    - [5.392, -3.733, 0.0]
    - [7.045, -6.207, 0.0]
    - [7.625, -9.125, 0.0]
    - [7.045, -12.043, 0.0]
    - [5.392, -14.517, 0.0]
    - [2.918, -16.170, 0.0]
    - [0.000, -16.750, 0.0]
    - [-2.918, -16.170, 0.0]
    - [-5.392, -14.517, 0.0]
    - [-7.045, -12.043, 0.0]
    - [-7.625, -9.125, 0.0]
    - [-7.045, -6.207, 0.0]
    - [-5.392, -3.733, 0.0]
    - [-2.918, -2.080, 0.0]

    # 原左圆外圈转换后：圆心 (0.0, 9.125)，半径 10.625 m。
    # 两端严格接入入口/出口直道边界 y=1.500 m；13点沿外侧长弧等分。
    - [7.399, 1.500, 0.0]
    - [9.765, 4.936, 0.0]
    - [10.624, 9.019, 0.0]
    - [9.846, 13.117, 0.0]
    - [7.551, 16.600, 0.0]
    - [4.091, 18.931, 0.0]
    - [0.000, 19.750, 0.0]
    - [-4.091, 18.931, 0.0]
    - [-7.551, 16.600, 0.0]
    - [-9.846, 13.117, 0.0]
    - [-10.624, 9.019, 0.0]
    - [-9.765, 4.936, 0.0]
    - [-7.399, 1.500, 0.0]

  # 红色行径锥桶：上方圆内圈16个 + 下方圆外圈13个。
  red_cones:
    # 原左圆内圈转换后：圆心 (0.0, 9.125)，半径 7.625 m。
    - [0.000, 1.500, 0.0]
    - [2.918, 2.080, 0.0]
    - [5.392, 3.733, 0.0]
    - [7.045, 6.207, 0.0]
    - [7.625, 9.125, 0.0]
    - [7.045, 12.043, 0.0]
    - [5.392, 14.517, 0.0]
    - [2.918, 16.170, 0.0]
    - [0.000, 16.750, 0.0]
    - [-2.918, 16.170, 0.0]
    - [-5.392, 14.517, 0.0]
    - [-7.045, 12.043, 0.0]
    - [-7.625, 9.125, 0.0]
    - [-7.045, 6.207, 0.0]
    - [-5.392, 3.733, 0.0]
    - [-2.918, 2.080, 0.0]

    # 原右圆外圈转换后：圆心 (0.0, -9.125)，半径 10.625 m。
    # 两端严格接入入口/出口直道边界 y=-1.500 m；13点沿外侧长弧等分。
    - [7.399, -1.500, 0.0]
    - [9.765, -4.936, 0.0]
    - [10.624, -9.019, 0.0]
    - [9.846, -13.117, 0.0]
    - [7.551, -16.600, 0.0]
    - [4.091, -18.931, 0.0]
    - [0.000, -19.750, 0.0]
    - [-4.091, -18.931, 0.0]
    - [-7.551, -16.600, 0.0]
    - [-9.846, -13.117, 0.0]
    - [-10.624, -9.019, 0.0]
    - [-9.765, -4.936, 0.0]
    - [-7.399, -1.500, 0.0]

  # 低黄色减速锥桶：入口与出口门，标准小锥桶。
  yellow_low_cones:
    - [12.000, 1.500, 0.0]
    - [12.000, -1.500, 0.0]
    - [-12.000, 1.500, 0.0]
    - [-12.000, -1.500, 0.0]

  # 高黄色换向锥桶：两圆切换区域，双反光带大锥桶。
  yellow_high_cones:
    - [1.500, 1.500, 0.0]
    - [-1.500, 1.500, 0.0]
    - [1.500, -1.500, 0.0]
    - [-1.500, -1.500, 0.0]

  # 计时线：车辆沿 +X 方向通过 x=0。起终线重合，每次下一次同向跨线
  # 即完成当前单圈并开始下一单圈计时。
  lines:
    timing_start:
      p1: [0.000, -1.500, 0.0]
      p2: [0.000, 1.500, 0.0]
      direction: positive_x
    finish:
      p1: [0.000, -1.500, 0.0]
      p2: [0.000, 1.500, 0.0]
      direction: positive_x
